<!doctype html>
<!-- PLANTILLA OG COCO GO (1200x630). Render: Chrome headless --screenshot=og.png --window-size=1200,630 -->
<html lang="es"><head><meta charset="utf-8">
<style>
  :root{--theme:#111111;--theme-light:#C4C7CC;--theme-rgb:120,124,130;--ink:#EAF0F7;--bg:#0B0F1A;}
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{background:
      radial-gradient(1100px 600px at 78% -10%, rgba(var(--theme-rgb),.28), transparent 60%),
      radial-gradient(800px 500px at 0% 120%, rgba(var(--theme-rgb),.10), transparent 55%),
      #0B0F1A;
    color:var(--ink);font-family:"Bricolage Grotesque","Helvetica Neue",Arial,sans-serif;
    padding:74px 84px;display:flex;flex-direction:column;justify-content:space-between;position:relative}
  .top{display:flex;align-items:center;gap:16px}
  .top img{height:46px}
  .chip{display:inline-block;background:rgba(var(--theme-rgb),.16);color:var(--theme-light);
    border:1.5px solid rgba(var(--theme-rgb),.45);border-radius:999px;padding:7px 20px;
    font-size:22px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
  h1{font-size:72px;line-height:1.05;font-weight:800;letter-spacing:-.02em;max-width:1040px}
  h1 .grad{color:var(--theme-light)}
  h1 .cl{height:.82em;width:.82em;vertical-align:-.06em;margin-right:.12em;background:#000;border-radius:10px;padding:4px}
  .sub{font-size:26px;color:#AeB8C9;margin-top:22px;font-weight:500;max-width:980px}
  .foot{display:flex;align-items:center;justify-content:space-between;font-size:24px;color:#8A96B0}
  .foot b{color:var(--ink)}
</style></head>
<body>
  <div class="top"><img src="../assets/logo-coco-go.svg" alt="COCO GO"><span class="chip">Nivel Intermedio</span></div>
  <div>
    <h1><img class="cl" src="../assets/logo-grok.svg" alt="">Grok para tu negocio,<br><span class="grad">imagen y video que se corrigen.</span></h1>
    <div class="sub">SuperGrok: radar Expert, papeles, piloto, Imagine. 8 módulos concatenados, sin código.</div>
  </div>
  <div class="foot"><span>Curso interactivo · 8 módulos</span><span><b>coco-go.github.io</b></span></div>
</body></html>
