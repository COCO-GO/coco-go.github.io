<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>COCO GO — Cursos prácticos de IA para tu negocio</title>
<meta name="description" content="COCO GO: cursos prácticos de IA para emprendedores y PyMEs. Muy pronto." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#070A12; --bg:#0A0E1A; --surface:#0F1525;
  --text:#EAF0FB; --muted:#9AA8C2;
  --coral:#FF6B4A; --coral-rgb:255,107,74;
  --theme-rgb:16,163,127;
  --border:rgba(150,170,210,.16);
  --display:'Bricolage Grotesque',serif; --body:'Hanken Grotesk',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--body);background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:2rem;text-align:center;position:relative;overflow:hidden;
}
body::before{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(55% 45% at 15% 8%, rgba(var(--theme-rgb),.16), transparent 60%),
    radial-gradient(45% 40% at 90% 96%, rgba(var(--coral-rgb),.12), transparent 60%),
    linear-gradient(180deg, var(--ink), var(--bg) 45%, var(--ink));
}
.card{max-width:480px}
.logo{height:56px;width:auto;display:block;margin:0 auto 1.75rem}
h1{
  font-family:var(--display);font-weight:800;font-size:clamp(1.6rem,5vw,2.1rem);
  line-height:1.25;color:var(--text);margin-bottom:.85rem;
}
h1 .go{color:var(--coral)}
p{color:var(--muted);font-size:1rem;line-height:1.6;margin-bottom:1.75rem}
.badge{
  display:inline-block;font-size:.78rem;font-weight:600;letter-spacing:.03em;
  color:var(--coral);background:rgba(var(--coral-rgb),.1);
  border:1px solid rgba(var(--coral-rgb),.3);padding:.4rem .9rem;border-radius:999px;
  margin-bottom:1.75rem;
}
.ig{
  display:inline-flex;align-items:center;gap:.5rem;color:var(--text);
  text-decoration:none;font-weight:600;font-size:.95rem;
  border:1px solid var(--border);border-radius:12px;padding:.7rem 1.2rem;
  transition:border-color .2s, background .2s;
}
.ig:hover{border-color:var(--coral);background:rgba(var(--coral-rgb),.08)}
.ig svg{width:18px;height:18px;flex-shrink:0}
</style>
</head>
<body>
<div class="card">
  <img src="assets/logo-coco-go.svg" class="logo" alt="COCO GO">
  <span class="badge">Muy pronto</span>
  <h1>Cursos prácticos de <span class="go">IA</span> para tu negocio</h1>
  <p>Guías paso a paso para usar inteligencia artificial en tu emprendimiento o PyME. Sin tecnicismos, con resultados reales.</p>
  <a class="ig" href="https://instagram.com/cocogo" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/></svg>
    @cocogo
  </a>
</div>
</body>
</html>
